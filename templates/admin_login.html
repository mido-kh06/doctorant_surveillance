<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول المشرف - كلية الشريعة بفاس</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f4f7f6',
                            500: '#006241',
                            600: '#005236',
                            700: '#00422c',
                        },
                        accent: {
                            gold: '#C5A880',
                        }
                    },
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                        tajawal: ['Tajawal', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Cairo', 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #f0f4f1 0%, #e2eae7 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
        <!-- Logo / Title -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-brand-50 text-brand-500 mb-4 shadow-inner border border-brand-500/20">
                <i class="fa-solid fa-shield-halved text-2xl"></i>
            </div>
            <h2 class="text-2xl font-extrabold text-brand-700 font-tajawal">بوابة المشرف (SuperAdmin)</h2>
            <p class="text-slate-500 mt-2 text-sm">إدارة وتوزيع فترات الحراسة - سلك الدكتوراه</p>
        </div>

        <!-- Login Card -->
        <div class="glass-card rounded-3xl p-8 border-t-8 border-brand-500 shadow-2xl relative overflow-hidden bg-white">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="mb-6 p-4 rounded-xl flex items-center gap-3 bg-red-50 text-red-800 border border-red-200">
                            <i class="fa-solid fa-triangle-exclamation"></i>
                            <p class="font-bold text-sm">{{ message }}</p>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('admin_login') }}" method="POST" class="space-y-6">
                <div>
                    <label for="username" class="block text-sm font-bold text-slate-700 mb-2">اسم المستخدم</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 right-0 flex items-center pr-3.5 text-slate-400">
                            <i class="fa-solid fa-user text-sm"></i>
                        </span>
                        <input type="text" id="username" name="username" required style="direction: ltr;"
                               class="w-full pr-10 pl-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-slate-800 font-semibold focus:border-brand-500 focus:bg-white transition-all text-right">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-bold text-slate-700 mb-2">كلمة المرور</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 right-0 flex items-center pr-3.5 text-slate-400">
                            <i class="fa-solid fa-lock text-sm"></i>
                        </span>
                        <input type="password" id="password" name="password" required style="direction: ltr;"
                               class="w-full pr-10 pl-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-slate-800 font-semibold focus:border-brand-500 focus:bg-white transition-all text-right">
                    </div>
                </div>

                <div>
                    <button type="submit" class="w-full px-6 py-3 bg-brand-500 hover:bg-brand-600 text-white font-bold rounded-xl shadow-lg hover:shadow-brand-500/20 active:scale-95 transition-all text-center flex items-center justify-center gap-2 text-base">
                        <i class="fa-solid fa-right-to-bracket"></i> تسجيل الدخول
                    </button>
                </div>
            </form>

            <div class="mt-8 pt-4 border-t border-slate-100 text-center">
                <a href="{{ url_for('index') }}" class="text-xs text-slate-400 hover:text-brand-500 transition-colors inline-flex items-center gap-1 font-bold">
                    <i class="fa-solid fa-arrow-right"></i> العودة لصفحة الطالب
                </a>
            </div>
        </div>
    </div>
</body>
</html>
